services:
  api:
    image: nexus.server.cranie.com/docker/calendar-app-api:${TAG}
    build: ./api
    container_name: calendar-api
    ports:
      - "23000:3000"

  web:
    image: nexus.server.cranie.com/docker/calendar-app-web:${TAG}
    build: ./web
    container_name: calendar-web
    ports:
      - "28080:80"
    depends_on:
      - api